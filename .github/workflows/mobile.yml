name: Mobile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scaffold:
    name: Scaffold checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run scaffold check
        run: npm run lint

  android-apk:
    name: Android installable APK
    runs-on: ubuntu-latest
    needs: scaffold
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Generate Android project
        run: npm run prebuild:android

      - name: Allow test release APK to use debug signing
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('android/app/build.gradle')
          s = p.read_text()
          s = s.replace('signingConfig signingConfigs.release', 'signingConfig signingConfigs.debug')
          s = s.replace('signingConfig = signingConfigs.release', 'signingConfig = signingConfigs.debug')
          p.write_text(s)
          PY

      - name: Build Android installable APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Prepare APK artifact
        run: |
          mkdir -p release
          SRC=$(find android/app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)
          if [ -z "$SRC" ]; then
            echo "No release APK found"
            find android/app/build/outputs -type f -print || true
            exit 1
          fi
          cp "$SRC" release/LegacyCoin-Mobile-Wallet-android-installable.apk
          sha256sum release/LegacyCoin-Mobile-Wallet-android-installable.apk > release/LegacyCoin-Mobile-Wallet-android-installable.apk.sha256.txt
          ls -la release

      - name: Upload Android installable APK
        uses: actions/upload-artifact@v4
        with:
          name: LegacyCoin-Mobile-Wallet-android-installable-apk
          path: |
            release/*.apk
            release/*sha256.txt
          if-no-files-found: error

  ios-simulator:
    name: iOS simulator project check
    runs-on: macos-latest
    needs: scaffold
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate iOS project
        run: npm run prebuild:ios

      - name: Upload iOS project artifact
        uses: actions/upload-artifact@v4
        with:
          name: LegacyCoin-Mobile-Wallet-ios-project
          path: ios
          if-no-files-found: error
